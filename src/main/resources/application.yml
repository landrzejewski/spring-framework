server:
  port: 8000
spring:
  datasource:
    url: jdbc:h2:file:./data/h2-db.db;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    generate-ddl: true
    open-in-view: false # true skutkuje otworzeniem dodatkowej transakcji na poziomie widoku (zaszlość historyczna/ant pattern), należy ustawić na fals
  #  jpa:
#    hibernate:
#      ddl-auto: create-drop
  data:
    mongodb:
      username: admin
      password: admin
      database: payments
      host: localhost
      port: 27017
      authentication-database: admin
      # auto-index-creation: true
  messages:
    basename: exceptions
#management:
#  endpoints:
#    web:
#      exposure:
#        include: "*"
logging:
  level:
    org.javamoney.moneta: OFF

